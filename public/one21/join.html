<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ONE21 — Join</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#00e676">
  <link rel="stylesheet" href="/css/design-system.css">
  <link rel="stylesheet" href="/api/theme/active.css">
  <link rel="stylesheet" href="/css/layers/pages/join.css">
</head>
<body class="join-page">

  <div class="join-vignette" aria-hidden="true"></div>

  <header class="join-header">
    <span class="join-brand join-brand--flip">ONE</span>
    <span class="join-brand-sep" aria-hidden="true">2</span>
    <span class="join-brand">ONE</span>
  </header>

  <main class="join-main">
    <!-- Step: Upload QR — doar iconița elegantă -->
    <div id="stepUpload" class="join-step">
      <label class="join-qr-zone" id="uploadLabel">
        <input type="file" id="qrFile" accept="image/*">
        <span class="join-qr-zone__icon" aria-hidden="true">
          <svg class="join-qr-icon" viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="0.8" stroke-linecap="round" stroke-linejoin="round">
            <rect x="5" y="5" width="12" height="12" rx="1.5"/>
            <rect x="31" y="5" width="12" height="12" rx="1.5"/>
            <rect x="5" y="31" width="12" height="12" rx="1.5"/>
            <path d="M22 23h4M28 23h3M22 28h3M27 28h4M22 33h4M30 33h3"/>
            <path d="M11 9v4M35 9v4M11 35v4"/>
          </svg>
        </span>
      </label>
      <p id="uploadError" class="join-error" aria-live="polite"></p>
    </div>

    <!-- Step: Who are you? -->
    <div id="stepWho" class="join-step">
      <div class="join-step-inner">
        <h1 class="join-step__title">Cine ești?</h1>
        <p class="join-step__subtitle">Prenumele (ONE / nume) de pe invitație.</p>
        <form id="formWho">
          <div class="join-field">
            <label for="answer">Prenume</label>
            <input type="text" id="answer" class="input" placeholder="Prenume" autocomplete="off" required>
          </div>
          <div class="join-actions">
            <button type="submit" class="btn btn--primary" id="btnWho">Continuă</button>
          </div>
        </form>
        <p id="whoError" class="join-error" aria-live="polite"></p>
      </div>
    </div>

    <!-- Step: Register -->
    <div id="stepRegister" class="join-step">
      <div class="join-step-inner">
        <h1 class="join-step__title">Cont nou</h1>
        <p class="join-step__subtitle">Alege username și parolă.</p>
        <form id="formRegister">
          <div class="join-field">
            <label for="username">Username</label>
            <input type="text" id="username" class="input" placeholder="Username" autocomplete="username" required>
          </div>
          <div class="join-field">
            <label for="password">Parolă</label>
            <input type="password" id="password" class="input" placeholder="••••••••" autocomplete="new-password" required>
          </div>
          <div class="join-actions">
            <button type="submit" class="btn btn--primary" id="btnRegister">Creează cont</button>
          </div>
        </form>
        <p id="regError" class="join-error" aria-live="polite"></p>
      </div>
    </div>
  </main>

  <footer class="join-footer">
    <span class="join-footer__text">fuelled by</span>
    <span class="join-footer__logo" aria-hidden="true">ONE/AIgency</span>
  </footer>

<script>
(function () {
  const pathParts = window.location.pathname.split('/').filter(Boolean);
  const tokenFromPath = pathParts[pathParts.length - 1] !== 'join' ? pathParts[pathParts.length - 1] : null;

  const stepUpload = document.getElementById('stepUpload');
  const stepWho = document.getElementById('stepWho');
  const stepRegister = document.getElementById('stepRegister');
  const uploadLabel = document.getElementById('uploadLabel');
  const qrFile = document.getElementById('qrFile');
  const uploadError = document.getElementById('uploadError');
  const formWho = document.getElementById('formWho');
  const answer = document.getElementById('answer');
  const whoError = document.getElementById('whoError');
  const formRegister = document.getElementById('formRegister');
  const username = document.getElementById('username');
  const password = document.getElementById('password');
  const regError = document.getElementById('regError');

  function showStep(step) {
    stepUpload.classList.remove('is-active');
    stepWho.classList.remove('is-active');
    stepRegister.classList.remove('is-active');
    step.classList.add('is-active');
  }

  function setError(el, msg) {
    el.textContent = msg || '';
  }

  function extractToken(dataStr) {
    const value = String(dataStr || '').trim();
    if (!value) return null;
    const urlMatch = value.match(/\/join\/([a-zA-Z0-9_-]+)/);
    const queryMatch = value.match(/[?&]token=([a-zA-Z0-9_-]+)/);
    if (urlMatch) return urlMatch[1];
    if (queryMatch) return queryMatch[1];
    if (/^[a-zA-Z0-9_-]+$/.test(value)) return value;
    return null;
  }

  function goToJoinToken(token) {
    const base = window.location.pathname.replace(/\/?$/, '');
    window.location.href = (base.indexOf('/one21/join') !== -1 ? base.replace(/\/?$/, '') : '/one21/join') + '/' + token;
  }

  async function ensureJsQrLoaded() {
    if (typeof window !== 'undefined' && typeof window.jsQR !== 'undefined') return true;

    const sources = [
      'https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js',
      'https://unpkg.com/jsqr@1.4.0/dist/jsQR.min.js'
    ];

    for (let i = 0; i < sources.length; i += 1) {
      const src = sources[i];
      try {
        await new Promise(function (resolve, reject) {
          const s = document.createElement('script');
          s.src = src;
          s.async = true;
          s.onload = resolve;
          s.onerror = reject;
          document.head.appendChild(s);
        });
        if (typeof window.jsQR !== 'undefined') return true;
      } catch (e) {
        // try next CDN
      }
    }
    return false;
  }

  async function decodeQrFromImage(img) {
    const maxSide = 1400;
    const scale = Math.min(1, maxSide / Math.max(img.width, img.height));
    const w = Math.max(1, Math.round(img.width * scale));
    const h = Math.max(1, Math.round(img.height * scale));

    const canvas = document.createElement('canvas');
    canvas.width = w;
    canvas.height = h;

    const ctx = canvas.getContext('2d');
    if (!ctx) return null;

    ctx.drawImage(img, 0, 0, w, h);
    const imageData = ctx.getImageData(0, 0, w, h);

    // Pass 0: native QR detector (works even if jsQR CDN fails)
    if (typeof window !== 'undefined' && 'BarcodeDetector' in window) {
      try {
        const detector = new window.BarcodeDetector({ formats: ['qr_code'] });
        const found = await detector.detect(canvas);
        if (found && found.length > 0 && found[0].rawValue) {
          return { data: String(found[0].rawValue) };
        }
      } catch (e) {
        // Ignore and continue with jsQR fallbacks
      }
    }

    if (typeof jsQR === 'undefined') {
      const loaded = await ensureJsQrLoaded();
      if (!loaded || typeof jsQR === 'undefined') return null;
    }

    // Pass 1: direct decode (best case)
    let code = jsQR(imageData.data, w, h, { inversionAttempts: 'attemptBoth' });
    if (code && code.data) return code;

    // Pass 2: high-contrast black/white threshold
    const bw = new Uint8ClampedArray(imageData.data);
    for (let i = 0; i < bw.length; i += 4) {
      const lum = 0.299 * bw[i] + 0.587 * bw[i + 1] + 0.114 * bw[i + 2];
      const v = lum > 145 ? 255 : 0;
      bw[i] = v;
      bw[i + 1] = v;
      bw[i + 2] = v;
    }
    code = jsQR(bw, w, h, { inversionAttempts: 'dontInvert' });
    if (code && code.data) return code;

    // Pass 3: inverted threshold image
    for (let i = 0; i < bw.length; i += 4) {
      bw[i] = 255 - bw[i];
      bw[i + 1] = 255 - bw[i + 1];
      bw[i + 2] = 255 - bw[i + 2];
    }
    code = jsQR(bw, w, h, { inversionAttempts: 'dontInvert' });
    if (code && code.data) return code;

    return null;
  }

  if (!tokenFromPath) {
    showStep(stepUpload);
    qrFile.addEventListener('change', function () {
      setError(uploadError, '');
      const file = this.files && this.files[0];
      if (!file) return;
      const fr = new FileReader();
      fr.onload = function () {
        const img = new Image();
        img.onload = async function () {
          const code = await decodeQrFromImage(img);
          if (!code || !code.data) {
            const nativeAvailable = (typeof window !== 'undefined' && 'BarcodeDetector' in window);
            const jsqrAvailable = (typeof window !== 'undefined' && typeof window.jsQR !== 'undefined');
            if (!nativeAvailable && !jsqrAvailable) {
              setError(uploadError, 'Browserul nu are decoder QR disponibil. Încearcă Chrome/Edge sau deschide direct linkul de join.');
            } else {
              setError(uploadError, 'Nu s-a putut citi codul QR. Încearcă o imagine mai clară.');
            }
            return;
          }
          const token = extractToken(code.data);
          if (!token) {
            setError(uploadError, 'Cod invalid în QR.');
            return;
          }
          goToJoinToken(token);
        };
        img.onerror = function () { setError(uploadError, 'Imagine invalidă.'); };
        img.src = fr.result;
      };
      fr.readAsDataURL(file);
    });

    return;
  }

  const token = tokenFromPath;
  let invite = { nume: '', prenume: '' };
  let verified = false;

  fetch('/api/join/' + encodeURIComponent(token))
    .then(function (r) {
      if (!r.ok) throw new Error('Invitația nu există sau a fost folosită.');
      return r.json();
    })
    .then(function (data) {
      invite = data;
      showStep(verified ? stepRegister : stepWho);
    })
    .catch(function () {
      showStep(stepWho);
      whoError.textContent = 'Invitația nu există sau a fost folosită.';
    });

  formWho.addEventListener('submit', function (e) {
    e.preventDefault();
    setError(whoError, '');
    const ans = answer.value.trim();
    if (!ans) return;
    fetch('/api/join/verify', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token: token, answer: ans })
    })
      .then(function (r) {
        if (!r.ok) throw new Error('Răspuns incorect.');
        verified = true;
        showStep(stepRegister);
      })
      .catch(function () {
        whoError.textContent = 'Răspuns incorect. Încearcă din nou.';
      });
  });

  formRegister.addEventListener('submit', function (e) {
    e.preventDefault();
    setError(regError, '');
    const body = { token: token, username: username.value.trim(), password: password.value };
    fetch('/api/auth/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    })
      .then(function (r) {
        if (!r.ok) return r.json().then(function (d) { throw new Error(d.error || 'Eroare'); });
        return r.json();
      })
      .then(function () {
        var base = (window.location.pathname.indexOf('/one21') !== -1) ? '/one21' : '';
        window.location.href = base + (base ? '/login' : '/login.html');
      })
      .catch(function (err) {
        regError.textContent = err.message || 'Eroare la înregistrare.';
      });
  });
})();
</script>
<script src="/js/install-banner.js"></script>
</body>
</html>

<!doctype html>
<html lang="ro">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>One21 Health</title>
    <style>
      :root { color-scheme: light dark; }
      body { font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial; margin: 0; padding: 24px; background: #0b1020; color: #e7eaf3; }
      .card { max-width: 760px; margin: 0 auto; border: 1px solid rgba(255,255,255,0.12); border-radius: 12px; padding: 18px; background: rgba(255,255,255,0.04); }
      h1 { font-size: 18px; margin: 0 0 12px; font-weight: 600; }
      .muted { opacity: 0.8; font-size: 13px; }
      a { color: inherit; }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Health Check</h1>
      <div id="root"></div>
      <div class="muted" style="margin-top: 12px;">
        Endpoint: <a href="/health" target="_blank" rel="noreferrer">/health</a>
      </div>
    </div>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="/one21/health-status.js"></script>
  </body>
</html>

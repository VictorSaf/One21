<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ONE21</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#040404">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="ONE21">
  <link rel="stylesheet" href="/css/design-system.css">
  <link rel="stylesheet" href="/api/theme/active.css">
  <link rel="stylesheet" href="/css/layers/pages/login.css">
  <link rel="stylesheet" href="/css/layers/pages/index.css">
</head>
<body>

<div class="login-corners"></div>

<div class="login-wrap">
  <div class="login-card">
    <div class="login-brand">
      <div class="login-brand__logo">
        <span class="login-brand__box">ONE</span>
        <span class="login-brand__suffix">_21</span>
      </div>
      <p class="login-brand__subtitle">Main</p>
    </div>
    <a href="/join" class="main-qr-link" aria-label="Intră cu invitație (QR)">
      <svg class="main-qr-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
        <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="2" height="2"/><rect x="18" y="3" width="2" height="2"/>
        <rect x="14" y="7" width="2" height="2"/><rect x="18" y="7" width="2" height="2"/>
        <rect x="3" y="14" width="2" height="2"/><rect x="7" y="14" width="2" height="2"/><rect x="3" y="18" width="2" height="2"/><rect x="7" y="18" width="2" height="2"/>
        <rect x="14" y="14" width="7" height="7"/>
      </svg>
    </a>
    <a href="/hey" class="main-have-account" aria-label="Am cont (Enter)">
      <svg class="main-enter-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
        <polyline points="9 10 4 15 9 20"/>
        <path d="M20 4v7a4 4 0 0 1-4 4H4"/>
      </svg>
    </a>
  </div>
</div>

<script src="/js/install-banner.js"></script>
</body>
</html>
